version: '3.8'

x-service-hardening: &service-hardening
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

services:
  traefik:
    <<: *service-hardening
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - naruon-network

  prometheus:
    <<: *service-hardening
    image: prom/prometheus:latest
    tmpfs:
      - /prometheus
      - /tmp
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - naruon-network

  grafana:
    <<: *service-hardening
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    tmpfs:
      - /tmp
      - /var/lib/grafana
      - /var/log/grafana
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - naruon-network

  loki:
    <<: *service-hardening
    image: grafana/loki:2.9.2
    tmpfs:
      - /loki
      - /tmp
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - naruon-network

  tempo:
    <<: *service-hardening
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317" # otlp grpc
    networks:
      - naruon-network

  otel-collector:
    <<: *service-hardening
    image: otel/opentelemetry-collector:0.88.0
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - naruon-network

  keycloak:
    <<: *service-hardening
    image: quay.io/keycloak/keycloak:24.0.0
    command: start-dev
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is not set}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is not set}"
    tmpfs:
      - /opt/keycloak/data
      - /tmp
    ports:
      - "8081:8080"
    networks:
      - naruon-network

networks:
  naruon-network:
    driver: bridge
