apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-registry
      containers:
      - name: frontend
        image: ghcr.io/seongho-bae/ai_email_client-frontend:REPLACE_ME_VERSION
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
          - name: BACKEND_INTERNAL_URL
            value: "http://backend:8000"
          - name: ALLOW_DOCKER_BACKEND_INTERNAL_URL
            value: "1"
