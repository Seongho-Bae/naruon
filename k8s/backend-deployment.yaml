apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/seongho-bae/ai_email_client:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DATABASE_URL
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: ENCRYPTION_KEY
        - name: API_AUTH_USER_ID
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: API_AUTH_USER_ID
        - name: API_AUTH_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: API_AUTH_SIGNING_SECRET
