services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_email}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_postgres_password_123}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev_postgres_password_123}@db:5432/${POSTGRES_DB:-ai_email}
      DEBUG: "false"
      AUTH_SESSION_HMAC_SECRET: ${AUTH_SESSION_HMAC_SECRET:-25b36d17c4789a78f41c4dcdf35de122b8957a6b1c4bb29047f1608f9b426786}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python scripts/bootstrap_db.py && python scripts/start_backend.py --host 0.0.0.0 --port 8000"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      # NEXT_PUBLIC_API_URL is baked into browser-side client code. Keep this
      # host-reachable URL for local Compose; http://backend:8000 is only
      # resolvable inside the Docker network, not from the user's browser.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_INTERNAL_URL: http://backend:8000
      ALLOW_DOCKER_BACKEND_INTERNAL_URL: "1"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
