[tool.uv.workspace]
members = ["backend"]

[tool.pytest.ini_options]
testpaths = ["backend"]
pythonpath = ["backend"]
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:Using `httpx` with `starlette.testclient` is deprecated.*:starlette.exceptions.StarletteDeprecationWarning",
    "ignore:You are using a Python version.*which Google will stop supporting.*:FutureWarning",
    "ignore:Unclosed <MemoryObject:ResourceWarning",
    "ignore:pkg_resources is deprecated:UserWarning",
    "ignore:pkg_resources is deprecated:DeprecationWarning",
    "ignore:Deprecated call to .pkg_resources.declare_namespace:DeprecationWarning",
    "ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning",
    "ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning",
    "ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning",
]
markers = [
    "postgres: requires a reachable PostgreSQL DATABASE_URL",
]

[tool.coverage.run]
source = ["backend/core"]
omit = [
    "backend/tests/*",
    "backend/alembic/*",
]

[tool.coverage.report]
include = [
    "backend/core/version.py",
]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "@abstractmethod",
]
