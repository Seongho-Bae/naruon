name: Required PR Review Merge Scheduler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["Required OpenCode Review"]
    types: [completed]
  workflow_call:
    inputs:
      dry_run:
        description: Print planned actions without mutating PRs
        required: false
        default: false
        type: boolean
      max_prs:
        description: Maximum open PRs to inspect
        required: false
        default: "100"
        type: string
      trigger_reviews:
        description: Dispatch OpenCode Review for PR heads without current approval
        required: false
        default: true
        type: boolean
      enable_auto_merge:
        description: Enable auto-merge for current-head approved PRs
        required: false
        default: true
        type: boolean
      merge_mode:
        description: "Merge behavior for current-head approved PRs: auto, direct, or disabled"
        required: false
        default: auto
        type: string
      update_branches:
        description: Update outdated PR branches after OpenCode approval
        required: false
        default: true
        type: boolean
      stale_opencode_minutes:
        description: Redispatch OpenCode Review when an in-progress OpenCode check is older than this many minutes
        required: false
        default: "45"
        type: string
      project_flow:
        description: Project flow, usually github-flow or git-flow
        required: false
        default: ""
        type: string
      base_branch:
        description: Base branch to scan; defaults to the caller repository default branch
        required: false
        default: ""
        type: string
      canonical_ref:
        description: Ref of ContextualWisdomLab/.github to use for scheduler code
        required: false
        default: "main"
        type: string
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print planned actions without mutating PRs
        required: false
        default: false
        type: boolean
      max_prs:
        description: Maximum open PRs to inspect
        required: false
        default: "100"
      trigger_reviews:
        description: Dispatch OpenCode Review for PR heads without current approval
        required: false
        default: true
        type: boolean
      enable_auto_merge:
        description: Enable auto-merge for current-head approved PRs
        required: false
        default: true
        type: boolean
      merge_mode:
        description: "Merge behavior for current-head approved PRs: auto, direct, or disabled"
        required: false
        default: auto
      update_branches:
        description: Update outdated PR branches after OpenCode approval
        required: false
        default: true
        type: boolean
      stale_opencode_minutes:
        description: Redispatch OpenCode Review when an in-progress OpenCode check is older than this many minutes
        required: false
        default: "45"

concurrency:
  group: central-pr-review-merge-scheduler-${{ github.repository }}-${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  scan-pr-queue:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
      contents: write
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ github.token }}
      DEFAULT_BRANCH: ${{ inputs.base_branch || github.event.repository.default_branch }}
      DRY_RUN: ${{ inputs.dry_run == true }}
      MAX_PRS: ${{ inputs.max_prs || '100' }}
      PROJECT_FLOW_INPUT: ${{ inputs.project_flow || vars.PROJECT_FLOW || '' }}
      PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || '' }}
      TRIGGER_REVIEWS: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request_target' || inputs.trigger_reviews == true }}
      ENABLE_AUTO_MERGE: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request_target' || github.event_name == 'workflow_run' || inputs.enable_auto_merge == true }}
      MERGE_MODE: ${{ inputs.merge_mode || vars.PR_MERGE_MODE || 'auto' }}
      UPDATE_BRANCHES: ${{ github.event_name == 'schedule' || github.event_name == 'pull_request_target' || github.event_name == 'workflow_run' || inputs.update_branches == true }}
      STALE_OPENCODE_MINUTES: ${{ inputs.stale_opencode_minutes || vars.STALE_OPENCODE_MINUTES || '45' }}
    steps:
      - name: Resolve trusted scheduler source ref
        id: trusted_source
        env:
          INPUT_CANONICAL_REF: ${{ inputs.canonical_ref || '' }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          trusted_ref="${INPUT_CANONICAL_REF:-main}"
          case "$WORKFLOW_REF" in
            ContextualWisdomLab/.github/.github/workflows/pr-review-merge-scheduler.yml@*)
              trusted_ref="${WORKFLOW_REF##*@}"
              ;;
          esac
          printf 'ref=%s\n' "$trusted_ref" >>"$GITHUB_OUTPUT"

      - name: Checkout trusted scheduler
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ContextualWisdomLab/.github
          ref: ${{ steps.trusted_source.outputs.ref }}
          fetch-depth: 1

      - name: Self-test scheduler
        run: python3 scripts/ci/pr_review_merge_scheduler.py --self-test

      - name: Inspect PR review and merge queue
        run: |
          set -euo pipefail
          project_flow="$PROJECT_FLOW_INPUT"
          if [ -z "$project_flow" ]; then
            case "$DEFAULT_BRANCH" in
              main|master) project_flow="github-flow" ;;
              develop) project_flow="git-flow" ;;
              *) project_flow="github-flow" ;;
            esac
          fi
          args=(
            --repo "$GITHUB_REPOSITORY"
            --base-branch "$DEFAULT_BRANCH"
            --max-prs "$MAX_PRS"
            --project-flow "$project_flow"
            --review-workflow "Required OpenCode Review"
            --stale-opencode-minutes "$STALE_OPENCODE_MINUTES"
          )
          if [ -n "$PULL_REQUEST_NUMBER" ]; then
            args+=(--pr-number "$PULL_REQUEST_NUMBER")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ "$TRIGGER_REVIEWS" = "true" ]; then
            args+=(--trigger-reviews)
          else
            args+=(--no-trigger-reviews)
          fi
          if [ "$ENABLE_AUTO_MERGE" = "true" ]; then
            args+=(--enable-auto-merge)
          else
            args+=(--no-enable-auto-merge)
          fi
          args+=(--merge-mode "$MERGE_MODE")
          if [ "$UPDATE_BRANCHES" = "true" ]; then
            args+=(--update-branches)
          else
            args+=(--no-update-branches)
          fi
          python3 scripts/ci/pr_review_merge_scheduler.py "${args[@]}"
