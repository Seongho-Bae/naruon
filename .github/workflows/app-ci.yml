name: Application CI

on:
  pull_request:
    branches:
      - master
      - "release/**"
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: application-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTHONWARNINGS: error
      DISABLE_BACKGROUND_WORKERS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend lint
        run: |
          cd backend
          python -m ruff check .

      - name: Run backend tests
        run: |
          set -o pipefail
          cd backend
          python -m pytest -q 2>&1 | tee pytest_output.log
          if grep -qiE 'timeout|fatal|warn|denied' pytest_output.log; then
            echo "::error::Tests produced Timeout, Fatal, Warn, or Denied outputs"
            exit 1
          fi

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Run frontend lint
        run: cd frontend && npm run lint

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Build frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_BUILD_CPUS: "2"
          POSTCSS_WORKERS: "1"
          DISABLE_POSTCSS_WORKERS: "true"
        run: |
          rm -f ~/package-lock.json
          cd frontend && npm run build
