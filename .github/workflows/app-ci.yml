name: Application CI

on:
  pull_request:
    branches:
      - develop
      - master
      - "release/**"
  push:
    branches:
      - develop
      - master

permissions:
  contents: read

concurrency:
  group: application-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    env:
      PYTHONWARNINGS: error
      DISABLE_BACKGROUND_WORKERS: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements-hashes.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r backend/requirements-hashes.txt

      - name: Run backend lint
        run: |
          cd backend
          python -m ruff check .

      - name: Run backend tests
        run: |
          set -o pipefail
          cd backend
          python -m pytest -q \
            tests/test_config.py \
            tests/test_main.py \
            tests/test_accounts_api.py \
            tests/test_auth_real.py \
            tests/test_start_backend.py \
            tests/test_tenant_config_model.py \
            tests/test_release_governance.py::test_backend_images_use_python_314_runtime \
            tests/test_release_governance.py::test_app_ci_runs_backend_and_frontend_checks_without_duplicate_release_pushes \
            2>&1 | tee pytest_output.log
          if grep -qiE 'timeout|fatal|warn|denied' pytest_output.log; then
            echo "::error::Tests produced Timeout, Fatal, Warn, or Denied outputs"
            exit 1
          fi

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6


      - name: Install pnpm
        run: corepack enable pnpm

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: cd frontend && pnpm test

      - name: Run frontend lint
        run: cd frontend && pnpm run lint

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.ts', 'frontend/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-

      - name: Build frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
          NEXT_BUILD_CPUS: "2"
          POSTCSS_WORKERS: "1"
          DISABLE_POSTCSS_WORKERS: "true"
        run: |
          rm -f ~/package-lock.json
          cd frontend && pnpm run build
