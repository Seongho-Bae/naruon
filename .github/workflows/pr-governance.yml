name: PR Governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  workflow_run:
    workflows:
      - Application CI
      - Bandit Security Scan
      - Build and Publish Docker Images
      - Strix Security Scan
    types: [completed]
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write
  issues: write

jobs:
  governance:
    name: metadata-only gate evaluation
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'check_run' || github.event.check_run.app.slug == 'coderabbitai' || contains(github.event.check_run.name, 'CodeRabbit') || contains(github.event.check_run.name, 'coderabbit') }}
    steps:
      - name: Materialize trusted governance gate
        env:
          GH_TOKEN: ${{ github.token }}
          TRUSTED_PR_NUMBER: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number || github.event.check_run.pull_requests[0].number || github.event.inputs.pr_number || '' }}
        run: |
          set -euo pipefail

          if [ -n "$TRUSTED_PR_NUMBER" ]; then
            trusted_ref="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${TRUSTED_PR_NUMBER}" --jq '.base.sha')"
          else
            default_branch="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')"
            trusted_ref="$(gh api "repos/${GITHUB_REPOSITORY}/branches/${default_branch}" --jq '.commit.sha')"
          fi

          trusted_workspace="$RUNNER_TEMP/trusted-governance"
          trusted_archive="$RUNNER_TEMP/trusted-governance.tar.gz"
          mkdir -p "$trusted_workspace"
          gh api "/repos/${GITHUB_REPOSITORY}/tarball/${trusted_ref}" > "$trusted_archive"
          tar -xzf "$trusted_archive" -C "$trusted_workspace" --strip-components=1
          test -f "$trusted_workspace/scripts/ci/pr_governance_gate.sh"
          echo "GOVERNANCE_GATE=$trusted_workspace/scripts/ci/pr_governance_gate.sh" >> "$GITHUB_ENV"

      - name: Evaluate PR gate metadata
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DIRECT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          TARGET_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          WORKFLOW_RUN_PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number || '' }}
          CHECK_RUN_PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number || '' }}
        run: |
          bash "$GOVERNANCE_GATE"
