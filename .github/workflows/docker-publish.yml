name: Build and Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - "release/**"

env:
  REGISTRY: ghcr.io

jobs:
  pull_request_image_validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: .
            file: Dockerfile
            image: ai_email_client-backend
          - component: frontend
            context: .
            file: frontend/Dockerfile
            image: ai_email_client-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Read release version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION must be a SemVer release such as 0.1.0, got '${version}'."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=pr
            type=sha

      - name: Build Docker image without registry write token
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.component == 'frontend' && 'NEXT_PUBLIC_API_URL=/api' || '' }}

  publish_images:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: .
            file: Dockerfile
            image: ai_email_client-backend
          - component: frontend
            context: .
            file: frontend/Dockerfile
            image: ai_email_client-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read release version
        id: version
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION must be a SemVer release such as 0.1.0, got '${version}'."
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} must match VERSION v${version}."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.component == 'frontend' && 'NEXT_PUBLIC_API_URL=/api' || '' }}

      - name: Record image digest evidence
        run: |
          {
            echo "### ${{ matrix.component }} image digest"
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"
