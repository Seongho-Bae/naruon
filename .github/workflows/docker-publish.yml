name: Build and Publish Docker Images

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - "release/**"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  pull_request_image_validation:
    name: validate ${{ matrix.component }} image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build PR image without publishing
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

  publish_images:
    name: publish ${{ matrix.component }} image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read release version
        id: version
        run: |
          VERSION="$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            printf 'Tag %s does not match VERSION %s\n' "$GITHUB_REF_NAME" "$VERSION" >&2
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

      - name: Record image digest
        run: |
          {
            printf '### %s image\n' '${{ matrix.component }}'
            printf -- '- Image: `%s/%s/%s`\n' '${{ env.REGISTRY }}' '${{ github.repository_owner }}' '${{ matrix.image }}'
            printf -- '- Version: `%s`\n' '${{ steps.version.outputs.version }}'
            printf -- '- Digest: `%s`\n' '${{ steps.build.outputs.digest }}'
          } >> "$GITHUB_STEP_SUMMARY"
