name: Build and Publish Docker Images

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - "release/**"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pull_request_image_validation:
    name: validate ${{ matrix.component }} image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build PR image without publishing
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

  publish_images:
    name: publish ${{ matrix.component }} image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read release version
        id: version
        run: |
          VERSION="$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            printf 'Tag %s does not match VERSION %s\n' "$GITHUB_REF_NAME" "$VERSION" >&2
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

      - name: Record image digest
        run: |
          {
            printf '### %s image\n' '${{ matrix.component }}'
            printf -- '- Image: `%s/%s/%s`\n' '${{ env.REGISTRY }}' '${{ github.repository_owner }}' '${{ matrix.image }}'
            printf -- '- Version: `%s`\n' '${{ steps.version.outputs.version }}'
            printf -- '- Digest: `%s`\n' '${{ steps.build.outputs.digest }}'
          } >> "$GITHUB_STEP_SUMMARY"
