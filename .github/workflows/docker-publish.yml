name: Build and Publish Docker Images

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - master
      - "release/**"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Keep the explicit opt-in as belt-and-suspenders. The real warning removal
  # comes from the Node24-native action SHAs below because the runner may still
  # emit a deprecation annotation before the override takes effect.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pull_request_image_validation:
    name: validate ${{ matrix.component }} image
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: naruon
            image: naruon
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build PR image without publishing
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

  publish_images:
    name: publish ${{ matrix.component }} image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ai_email_client-backend
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: naruon
            image: naruon
            dockerfile: Dockerfile
            context: .
            build_args: |
              BUILDKIT_INLINE_CACHE=1
          - component: frontend
            image: ai_email_client-frontend
            dockerfile: frontend/Dockerfile
            context: .
            build_args: |
              NEXT_PUBLIC_API_URL=http://localhost:8000
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read release version
        id: version
        run: |
          VERSION="$(cat VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            printf 'Tag %s does not match VERSION %s\n' "$GITHUB_REF_NAME" "$VERSION" >&2
            exit 1
          fi
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          provenance: true
          sbom: true

      - name: Record image digest
        env:
          IMAGE_COMPONENT: ${{ matrix.component }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ matrix.image }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_VERSION: ${{ steps.version.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          {
            printf '### %s image\n' "$IMAGE_COMPONENT"
            printf -- '- Image: %s/%s/%s\n' "$IMAGE_REGISTRY" "$REPO_OWNER" "$IMAGE_NAME"
            printf -- '- Version: %s\n' "$IMAGE_VERSION"
            printf -- '- Digest: %s\n' "$IMAGE_DIGEST"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy_preflight:
    name: Detect AKS deploy configuration
    needs: publish_images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      aks_kubeconfig_configured: ${{ steps.aks.outputs.configured }}
    steps:
      - name: Check AKS kubeconfig secret
        id: aks
        env:
          AKS_KUBECONFIG_CONTENT: ${{ secrets.AKS_KUBECONFIG }}
        run: |
          if [ -n "$AKS_KUBECONFIG_CONTENT" ]; then
            printf 'configured=true\n' >> "$GITHUB_OUTPUT"
            printf 'AKS kubeconfig secret is configured; deployment will run.\n'
          else
            printf 'configured=false\n' >> "$GITHUB_OUTPUT"
            printf 'AKS kubeconfig secret is not configured; skipping deploy workflow.\n'
          fi

  deploy_to_aks:
    name: Call Deploy to AKS
    needs:
      - publish_images
      - deploy_preflight
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.deploy_preflight.outputs.aks_kubeconfig_configured == 'true'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
